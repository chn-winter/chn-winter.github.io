<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 not found！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #0f172a;
        }

        .container {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            padding: 2.5rem 2rem;
            text-align: center;
            transition: box-shadow 0.2s ease;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            color: #1e293b;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 1.75rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.75rem;
        }

        .description {
            font-size: 1rem;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 2rem;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: #e2e8f0;
            margin: 1.5rem auto 1rem;
            border-radius: 2px;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }
            .error-code {
                font-size: 6rem;
            }
            .title {
                font-size: 1.5rem;
            }
            .description {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="title">页面未找到</h1>
        <p class="description">
            抱歉，您访问的页面不存在或已被移除。<br>
            请检查链接地址，或从导航栏重新探索。
        </p>
    </div>
</body>
</html>
